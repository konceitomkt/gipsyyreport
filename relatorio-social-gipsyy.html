<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gipsyy · Relatório Social</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #0057B8;
      --primary-light: #2E7FD9;
      --primary-bg: #E6F0FA;
      --secondary: #FAB900;
      --secondary-bg: #FFF8E0;
      --bg: #F0F4F8;
      --card: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --border: #D1DCE8;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header {
      background: linear-gradient(135deg, #002D5C 0%, #0057B8 100%);
      color: white;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 24px rgba(0,87,184,0.25);
    }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .logo {
      background: transparent;
      border-radius: 0;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 30px;
      width: auto;
      display: block;
    }
    .header-title { border-left: 2px solid rgba(255,255,255,0.2); padding-left: 14px; }
    .header-title h1 { font-size: 16px; font-weight: 600; opacity: 0.9; }
    .header-title p { font-size: 11px; opacity: 0.45; margin-top: 2px; }

    .period-nav { display: flex; align-items: center; gap: 8px; }
    .pbtn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .pbtn:hover { background: rgba(255,255,255,0.22); }
    .pbtn:disabled { opacity: 0.3; cursor: default; }
    .period-label {
      color: white;
      font-weight: 700;
      font-size: 13px;
      min-width: 210px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 7px 14px;
      border-radius: 7px;
    }
    .pbtn-print { margin-left: 8px; }

    /* ─── NAV ─── */
    .nav {
      background: white;
      border-bottom: 2px solid var(--border);
      display: flex;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .ntab {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .ntab:hover { color: var(--primary); }
    .ntab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .ntab.debrief.active { color: #D97706; border-bottom-color: #D97706; }

    /* ─── MAIN ─── */
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 30px 40px;
    }
    .tab { display: none; }
    .tab.active { display: block; }

    /* ─── BANNER ─── */
    .banner {
      background: linear-gradient(135deg, #002D5C 0%, #0057B8 100%);
      border-radius: 18px;
      padding: 26px 30px;
      color: white;
      margin-bottom: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .banner-text h2 { font-size: 20px; font-weight: 800; }
    .banner-text p  { font-size: 12px; opacity: 0.5; margin-top: 3px; }
    .banner-stats { display: flex; gap: 36px; }
    .bstat { text-align: center; }
    .bstat-val { font-size: 26px; font-weight: 900; line-height: 1; }
    .bstat-lbl { font-size: 10px; opacity: 0.5; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .bstat-d   { font-size: 12px; font-weight: 700; color: #4ADE80; margin-top: 2px; }

    /* ─── KPI GRID ─── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 13px;
      margin-bottom: 26px;
    }
    .kcard {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .kcard:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,87,184,0.1); }
    .kicon {
      position: absolute;
      top: 14px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .klbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .kval {
      font-size: 27px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      margin-bottom: 5px;
    }
    .kdelta {
      font-size: 11px;
      font-weight: 600;
    }
    .kdelta.up     { color: var(--success); }
    .kdelta.down   { color: var(--danger);  }
    .kdelta.neutral { color: var(--muted);  }

    /* ─── SECTION TITLE ─── */
    .stitle {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 13px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .sbadge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--muted);
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .card-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .card-sub   { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

    /* ─── GRIDS ─── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .g21 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-wrap { position: relative; height: 200px; }

    /* ─── BARS ─── */
    .bar-item { margin-bottom: 11px; }
    .bar-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .bar-lbl { font-size: 12px; font-weight: 600; color: var(--text); }
    .bar-val { font-size: 12px; font-weight: 700; color: var(--text); }
    .bar-track { height: 7px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

    /* ─── STAT ROWS ─── */
    .srow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--bg);
      font-size: 13px;
    }
    .srow:last-child { border-bottom: none; }
    .srow-lbl { color: var(--muted); font-weight: 500; }
    .srow-r { text-align: right; }
    .srow-val { font-weight: 700; color: var(--text); }
    .srow-d { font-size: 11px; font-weight: 600; display: block; margin-top: 1px; }

    /* ─── AUDIENCE ─── */
    .gender-bar {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .g-f { background: #FAB900; }
    .g-m { background: #0057B8; }
    .gender-leg { display: flex; justify-content: space-between; }
    .gleg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
    .gdot { width: 9px; height: 9px; border-radius: 50%; }
    .gpct { font-weight: 700; }

    /* ─── COMPARISON CARDS ─── */
    .acct-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .acct-head {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .acct-flag { font-size: 26px; }
    .acct-name { font-size: 14px; font-weight: 700; }
    .acct-handle { font-size: 11px; color: var(--muted); }
    .acct-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .acct-metric {
      padding: 11px 13px;
      border-radius: 10px;
      background: var(--bg);
    }
    .acct-metric .kval { font-size: 18px; margin-bottom: 2px; }
    .tag {
      display: inline-flex;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      margin-left: auto;
    }
    .tag-en { background: var(--primary-bg); color: var(--primary); }
    .tag-fr { background: var(--secondary-bg); color: var(--secondary); }

    /* ─── INSIGHTS ─── */
    .ins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .ins-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .ins-card.positive { border-left: 4px solid var(--success); }
    .ins-card.warning  { border-left: 4px solid var(--warning); }
    .ins-card.info     { border-left: 4px solid var(--primary); }
    .ins-tag {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .ins-tag.positive { color: var(--success); }
    .ins-tag.warning  { color: var(--warning); }
    .ins-tag.info     { color: var(--primary); }
    .ins-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .ins-text  { font-size: 12px; color: var(--muted); line-height: 1.55; }
    .ins-action {
      margin-top: 9px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-bg);
      padding: 5px 10px;
      border-radius: 6px;
      display: inline-block;
    }
    .ins-cat {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ─── EMPTY ─── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty h3   { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p    { font-size: 13px; line-height: 1.5; }

    /* ─── DARK THEME ─── */
    [data-theme="dark"] {
      --primary: #4A9FE8;
      --primary-light: #6DB8F0;
      --primary-bg: #0D2A45;
      --secondary: #FAB900;
      --secondary-bg: #2A2000;
      --bg: #0F1117;
      --card: #1A1F2E;
      --text: #E8ECF0;
      --muted: #8B92A5;
      --border: #2A3040;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
    }
    [data-theme="dark"] .header { background: linear-gradient(135deg, #060B14 0%, #0A1E38 100%); }
    [data-theme="dark"] .banner { background: linear-gradient(135deg, #060B14 0%, #0A2A50 100%); }
    [data-theme="dark"] .nav    { background: #1A1F2E; border-bottom-color: #2A3040; }
    [data-theme="dark"] .logo   { background: #0F1117; }
    [data-theme="dark"] .kcard:hover { box-shadow: 0 8px 22px rgba(74,159,232,0.15); }
    [data-theme="dark"] .acct-card  { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .acct-kpi   { background: #0F1117; }
    [data-theme="dark"] .ins-card   { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .db-card    { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .empty      { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .analysis-card { background: #0D2A45 !important; border-left-color: #4A9FE8 !important; }
    [data-theme="dark"] .card  { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .kcard { background: #1A1F2E; border-color: #2A3040; }
    [data-theme="dark"] .srow  { border-bottom-color: #2A3040; }
    [data-theme="dark"] .bar-track { background: #0F1117; }
    [data-theme="dark"] .acct-tag  { background: #0F1117; }
    [data-theme="dark"] .sbadge    { background: #0F1117; }

    /* toggle button */
    .theme-toggle {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 7px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background 0.2s;
      margin-left: 6px;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.22); }

    /* ─── PRINT ─── */
    @media print {
      .period-nav .pbtn, .pbtn-print { display: none; }
      .main { padding: 0; max-width: 100%; }
      body  { background: white; }
      .kcard, .ins-card, .card { break-inside: avoid; }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 960px) {
      .main   { padding: 16px; }
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .header-brand { flex: 1; min-width: 0; }
      .period-nav { width: 100%; justify-content: center; flex-wrap: wrap; gap: 6px; }
      .period-label { min-width: 0; flex: 1; text-align: center; font-size: 12px; }
      .pbtn { padding: 6px 10px; font-size: 12px; }
      .pbtn-print { display: none; }
      .nav { padding: 0 8px; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; touch-action: pan-x; }
      .nav::-webkit-scrollbar { display: none; }
      .ntab { padding: 12px 14px; font-size: 12px; white-space: nowrap; }
      .g2, .g3, .g21 { grid-template-columns: 1fr; }
      .banner { flex-direction: column; align-items: flex-start; gap: 16px; padding: 18px; }
      .banner-stats { gap: 16px; flex-wrap: wrap; width: 100%; }
      .bstat { flex: 1; min-width: 80px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .kval { font-size: 22px; }
      .acct-card { padding: 14px; }
      .acct-kpi { grid-template-columns: 1fr 1fr; }
      .card { padding: 16px; }
      .header-title h1 { font-size: 14px; }
      .logo img { height: 28px; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .acct-kpi { grid-template-columns: 1fr; }
      .banner-stats { flex-direction: column; gap: 10px; }
      .bstat { text-align: left; }
    }
  </style>
</head>

// ══════════════════════════════════════════════════════════
//  U T I L S
// ══════════════════════════════════════════════════════════
function fmt(n) {
  if (n == null || n === '' || (typeof n === 'number' && isNaN(n))) return '—';
  n = Number(n);
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1).replace('.', ',') + 'K';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString('pt-PT');
}

function fmtPct(n, d = 1) {
  if (n == null) return '';
  return (n > 0 ? '+' : '') + Number(n).toFixed(d) + '%';
}

function dc(n) { return n > 0 ? 'up' : n < 0 ? 'down' : 'neutral'; }
function da(n) { return n > 0 ? '↑ ' : n < 0 ? '↓ ' : ''; }

// Delta badge — uses stored vsField or calculates from prev
function delta(d, field, vsField, prevD) {
  let pct = null;
  if (vsField && d[vsField] != null) { pct = d[vsField]; }
  else if (prevD && d[field] && prevD[field]) {
    pct = ((d[field] - prevD[field]) / prevD[field]) * 100;
  }
  if (pct == null) return `<span class="kdelta neutral">— vs. quinzena anterior</span>`;
  return `<span class="kdelta ${dc(pct)}">${da(pct)}${fmtPct(pct)} vs. quinzena anterior</span>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function calcEng(d) {
  if (!d || !d.followers) return 0;
  return ((d.interactions || 0) / d.followers) * 100;
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.getElementById('ntab-' + id).classList.add('active');
  if (id === 'overview') renderOverviewCharts();
  if (id === 'en') renderAccountCharts('en');
  if (id === 'fr') renderAccountCharts('fr');
  if (id === 'debrief') renderDebriefPage();
}

function changePeriod(dir) {
  const n = idx + dir;
  if (n < 0 || n >= KEYS.length) return;
  idx = n;
  renderAll();
}

function renderOverview() {
  const pd  = cur();

  const pfr = pvd?.fr || null;

  document.getElementById('period-lbl').textContent = pd.label || '—';
  document.getElementById('hdr-sub').textContent   = pd.dateRange || 'Instagram · EN & FR';
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === KEYS.length - 1);

  const totalF  = (en.followers    || 0) + (fr.followers    || 0);
  const totalR  = (en.reach        || 0) + (fr.reach        || 0);
  const totalI  = (en.interactions || 0) + (fr.interactions || 0);
  const totalG  = (en.growth       || 0) + (fr.growth       || 0);

  const prevTF = (pen?.followers    || 0) + (pfr?.followers    || 0);
  const prevTR = (pen?.reach        || 0) + (pfr?.reach        || 0);
  const prevTI = (pen?.interactions || 0) + (pfr?.interactions || 0);

  const rDelta = totalR && prevTR ? ((totalR - prevTR)/prevTR*100) : (en.reachVsPrev ?? null);
  const iDelta = totalI && prevTI ? ((totalI - prevTI)/prevTI*100) : null;
  // fDelta: usa followersVsPrev do Instagram (mais preciso que % de total acumulado)
  const fDelta = pen != null
    ? (en.followersVsPrev != null ? en.followersVsPrev : ((totalF - prevTF) / (prevTF || 1) * 100))
    : null;

function accountSummaryCard(acct, d, prevD) {
  const isEn   = acct === 'en';
  const flag   = isEn ? '🇵🇹' : '🇫🇷';
  const name   = isEn ? '@gipsyy_pt' : '@gipsyy_fr';
  const handle = isEn ? 'Instagram EN' : 'Instagram FR';
  const tag    = `<span class="tag tag-${acct}">${acct.toUpperCase()}</span>`;

  if (!d) return `
    <div class="acct-card">
      <div class="acct-head">
        <span class="acct-flag">${flag}</span>
        <div><div class="acct-name">${name}</div><div class="acct-handle">${handle}</div></div>
        ${tag}
      </div>
      <div class="empty" style="padding:24px 0">
        <div class="empty-icon" style="font-size:28px">📭</div>
        <p style="font-size:13px">Dados não disponíveis para este período.</p>
      </div>
    </div>`;

  const eng  = calcEng(d);
  const fDlt = d.followersVsPrev ?? (prevD ? ((d.followers-prevD.followers)/prevD.followers*100) : null);
  const rDlt = d.reachVsPrev     ?? (prevD ? ((d.reach-prevD.reach)/prevD.reach*100) : null);
  const gDlt = prevD ? ((d.growth-prevD.growth)/Math.abs(prevD.growth||1)*100) : null;

  const m = (lbl, val, dlt) => `
    <div class="acct-metric">
      <div class="klbl">${lbl}</div>
      <div class="kval">${fmt(val)}</div>
      ${dlt != null ? `<span class="kdelta ${dc(dlt)}">${da(dlt)}${fmtPct(dlt)}</span>` : ''}
    </div>`;

  return `
    <div class="acct-card">
      <div class="acct-head">
        <span class="acct-flag">${flag}</span>
        <div><div class="acct-name">${name}</div><div class="acct-handle">${handle}</div></div>
        ${tag}
      </div>
      <div class="acct-metrics">
        ${m('Seguidores',  d.followers, fDlt)}
        ${m('Crescimento', d.growth,    gDlt)}
        ${m('Alcance',     d.reach,     rDlt)}
        <div class="acct-metric">
          <div class="klbl">Eng. Rate</div>
          <div class="kval">${eng.toFixed(2)}%</div>
          <span class="kdelta neutral">interacções ÷ seguidores</span>
        </div>
      </div>
    </div>`;
}

      </div>
      <div class="card">
        <div class="card-title">Atividade do Perfil</div>
        <div class="card-sub">vs. período anterior (dado do Instagram)</div>
        ${activityRows(d)}

    </div>

    <!-- Audiência -->
    ${d.audience ? audienceSection(d.audience, c1) : ''}

    <!-- Charts -->
    <div class="g21">
      <div class="card">
        <div class="card-title">Crescimento Histórico de Seguidores</div>
        <div class="card-sub">Por quinzena</div>

function formatBars(obj, color) {
  if (!obj) return '<p style="color:var(--muted);font-size:13px">—</p>';
  const items = [
    { label: 'Stories', val: obj.stories },
    { label: 'Posts',  val: obj.posts   },
    { label: 'Reels',  val: obj.reels   },
  ].filter(i => i.val != null);
  const alphas = [1, 0.65, 0.35];
  return items.map((item, i) => `
    <div class="bar-item">
      <div class="bar-row">
        <span class="bar-lbl">${item.label}</span>
        <span class="bar-val">${item.val}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${item.val}%; background:${color}; opacity:${alphas[i]||0.35}"></div>
      </div>
    </div>`).join('');
}

function interactionRows(d) {
  return [
    ['Gostos',            d.likes,    null],
    ['Comentários',       d.comments, '⚠️ inclui participações no sorteio'],
    ['Guardados',         d.saves,    null],
    ['Partilhas',         d.shares,   null],
    ['Republicações',     d.reposts,  null],
  ].map(([lbl, val, note]) => `
    <div class="srow">
      <span class="srow-lbl">${lbl}</span>
      <div style="text-align:right">
        <span class="srow-val">${fmt(val)}</span>
        ${note ? `<div style="font-size:10px;color:var(--warning);margin-top:2px">${note}</div>` : ''}
      </div>
    </div>`).join('');
}

function activityRows(d) {
  return [
    ['👤 Visitas ao Perfil',  d.profileVisits, d.profileVisitsVsPrev ],
    ['Toques no Link',     d.linkClicks,    d.linkClicksVsPrev    ],
    ['Endereço Comercial', d.addressTaps,   d.addressTapsVsPrev   ],
  ].map(([lbl, val, pct]) => `
    <div class="srow">
      <span class="srow-lbl">${lbl}</span>
      <div class="srow-r">
        <span class="srow-val">${fmt(val)}</span>
        ${pct != null ? `<span class="srow-d ${dc(pct)}">${da(pct)}${fmtPct(pct)}</span>` : ''}
      </div>
    </div>`).join('');
}

function generateInsights(acct) {
  const d = cur()[acct];
  if (!d) return [];
  const ins = [];
  const eng = calcEng(d);
  const churn = d.followersGained ? (d.followersLost/d.followersGained*100) : 0;
  const topCountry = d.audience?.countries?.[0];
  const topAge = [...(d.audience?.age||[])].sort((a,b)=>b.pct-a.pct)[0];

  // Alcance
  if ((d.reachVsPrev||0) > 50)
    ins.push({ type:'positive', cat:'Alcance', acct,
      title:`Crescimento expressivo de alcance (+${d.reachVsPrev}%)`,
      text:`${fmt(d.reach)} contas alcançadas, alta de ${d.reachVsPrev}% vs. período anterior. As campanhas pagas estão a amplificar significativamente a visibilidade da marca.`,
      action: null });

  // Dependência de paid
  if ((d.impressionsPaidPct||0) > 80)
    ins.push({ type:'warning', cat:'Tráfego', acct,
      title:`${d.impressionsPaidPct}% das visualizações vêm de anúncios`,
      text:'O alcance orgânico é mínimo. Aumentar a frequência de Reels e optimizar hashtags são as alavancas mais eficazes para reduzir esta dependência ao longo do tempo.',
      action:'Publicar 1–2 Reels/semana com áudio trending' });

  // Posts têm melhor ROI
  if (d.interactionsByFormat?.posts > 70 && d.viewsByFormat?.posts < 50)
    ins.push({ type:'positive', cat:'Conteúdo', acct,
      title:`Posts: ${d.viewsByFormat.posts}% das views → ${d.interactionsByFormat.posts}% das interações`,
      text:`Posts são o formato com maior ROI de envolvimento. Apesar de gerarem menos visualizações que Stories, convertem muito mais em gostos, comentários e guardados.`,
      action: null });

  // Reels
  if ((d.viewsByFormat?.reels||0) < 20)
    ins.push({ type:'info', cat:'Conteúdo', acct,
      title:`Reels subutilizados (${d.viewsByFormat?.reels||0}% das views)`,
      text:'O algoritmo do Instagram prioriza Reels na aba Explorar — é o formato com maior potencial de alcance orgânico sem investimento pago. Conteúdo de 30–60 seg com destino tende a performar bem.',
      action:'Meta: 1 Reel de destino/semana' });

  // Comentários > Likes — contexto sorteio + decisão de desativar
  if (d.comments > d.likes)
    ins.push({ type:'warning', cat:'Engajamento', acct,
      title:`Comentários (${fmt(d.comments)}) acima do esperado — volume inflacionado pelo sorteio`,
      text:`O alto número de comentários nesta quinzena é resultado directo do giveaway activo no período, e não representa o comportamento orgânico típico da conta. Além disso, outros posts estão a receber reclamações nos comentários — por isso os comentários foram desactivados. Para a próxima quinzena, este número deve cair significativamente e reflectir melhor a realidade orgânica.`,
      action:'Monitorar comentários por DM e redirecionar insatisfeitos para canal de suporte' });

  // Churn
  if (churn > 25)
    ins.push({ type:'warning', cat:'Audiência', acct,
      title:`Churn de seguidores: ${Math.round(churn)}% (${fmt(d.followersLost)} saídas vs. ${fmt(d.followersGained)} novos)`,
      text:'Seguidores ganhos via giveaway tendem a sair quando a promoção termina. Conteúdo de retenção — bastidores, benefícios da Gipsyy, depoimentos — ajuda a manter quem chegou.',
      action:'Criar post de "Por que viajar pela Gipsyy" a cada quinzena' });

  // Concentração geográfica
  if (topCountry && topCountry.pct > 65)
    ins.push({ type:'info', cat:'Audiência', acct,
      title:`Audiência concentrada em ${topCountry.name} (${topCountry.pct}%)`,
      text:`Apesar de ser a conta EN, a audiência é maioritariamente portuguesa. Espanha (${d.audience?.countries?.[2]?.pct}%) e França (${d.audience?.countries?.[3]?.pct}%) estão sub-representadas — mercados com rotas diretas Gipsyy.`,
      action:'Testar posts citando rotas ES/FR para atrair esse público' });

  // Perfil demográfico
  if (d.audience?.gender?.female > 60 && topAge)
    ins.push({ type:'info', cat:'Audiência', acct,
      title:`Público: ${d.audience.gender.female}% mulheres · maior faixa ${topAge.range} (${topAge.pct}%)`,
      text:'Conteúdo de inspiração de viagem, conforto, praticidade e experiências partilhadas tende a ressoar melhor com este perfil. UGC de viajantes femininas é especialmente eficaz.',
      action:'Incluir depoimentos e UGC de clientes neste perfil demográfico' });

  // Visitas ao perfil
  if ((d.profileVisitsVsPrev||0) > 40)
    ins.push({ type:'positive', cat:'Conversão', acct,
      title:`Visitas ao perfil +${d.profileVisitsVsPrev}% (${fmt(d.profileVisits)} visitas)`,
      text:'Crescimento forte de interesse. A bio e o link devem estar optimizados para converter esta visita — link com as rotas principais ou promoção activa aumenta os cliques.',
      action:'Actualizar link da bio com destaque do mês ou oferta activa' });

  // Cliques no link
  if ((d.linkClicksVsPrev||0) > 0)
    ins.push({ type:'positive', cat:'Conversão', acct,
      title:`Cliques no link +${d.linkClicksVsPrev}% (${fmt(d.linkClicks)} toques)`,
      text:'Intenção de compra crescente. CTAs diretos nos posts ("Link na bio para reservar") e Stickers de Link nos Stories podem amplificar ainda mais esta métrica.',
      action: null });

  return ins;
}

function renderInsightsPage() {
  const el  = document.getElementById('tab-ins');
  const pd  = cur();
  const enI = generateInsights('en');
  const frI = generateInsights('fr');
  const all = [...enI, ...frI];

  if (!all.length) {
    el.innerHTML = `<div class="empty" style="padding:80px 0"><div class="empty-icon">💡</div><h3>Nenhum insight disponível</h3><p>Adicione dados de pelo menos uma conta para gerar análises.</p></div>`;
    return;
  }

  const cats = [...new Set(all.map(i => i.cat))];
  const catIcons = { Alcance:'📡', Tráfego:'🚦', Conteúdo:'🖼️', Engajamento:'❤️', Audiência:'👥', Conversão:'🎯' };
  const tagLbls  = { positive:'✅ Resultado', warning:'⚠️ Atenção', info:'💡 Insight' };
  const flagMap  = { en:'🇬🇧 EN', fr:'🇫🇷 FR' };

  const cards = (list) => list.map(i => `
    <div class="ins-card ${i.type}">
      <div class="ins-tag ${i.type}">${tagLbls[i.type]||'💡'} · ${flagMap[i.acct]||''}</div>
      <div class="ins-title">${esc(i.title)}</div>
      <div class="ins-text">${esc(i.text)}</div>
      ${i.action ? `<div class="ins-action">→ ${esc(i.action)}</div>` : ''}
    </div>`).join('');

  el.innerHTML = `
    <div style="margin-bottom:22px">
      <h2 style="font-size:19px;font-weight:800">💡 Insights &amp; Recomendações</h2>
      <p style="font-size:12px;color:var(--muted);margin-top:4px">Análise do período ·${esc(pd.label||'—')}</p>
    </div>
    ${cats.map(cat => `
      <div class="ins-cat">${catIcons[cat]||'📌'} ${cat}</div>
      <div class="ins-grid">${cards(all.filter(i => i.cat === cat))}</div>
    `).join('')}`;
}

function mkChart(id, cfg) {
  if (charts[id]) charts[id].destroy();
  const c = document.getElementById(id);
  if (!c) return;
  charts[id] = new Chart(c.getContext('2d'), cfg);
}

const chartOpts = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { position:'top', labels:{ usePointStyle:true, boxWidth:8 } } },
  scales: {
    y: { grid:{ color:'#E8E5FF' }, ticks:{ callback: v => fmt(v), color:'#6B6580', font:{size:11} } },
    x: { grid:{ display:false  }, ticks:{ color:'#6B6580', font:{size:11} } }
  }
};

function renderOverviewCharts() {
  const labels = KEYS.map(k => DATA[k]?.label?.split('·')[0].trim() || k);
  const enF    = KEYS.map(k => DATA[k]?.en?.followers || 0);
  const frF    = KEYS.map(k => DATA[k]?.fr?.followers || 0);

  mkChart('growthChart', {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'EN', data:enF, borderColor:'#0057B8', backgroundColor:'rgba(0,87,184,0.08)', tension:0.4, fill:true, pointBackgroundColor:'#0057B8', pointRadius:5 },
        { label:'FR', data:frF, borderColor:'#FAB900', backgroundColor:'rgba(250,185,0,0.08)', tension:0.4, fill:true, pointBackgroundColor:'#FAB900', pointRadius:5 },
      ]
    },
    options: chartOpts
  });

  const en = cur().en || {};
  const fr = cur().fr || {};
  mkChart('mixChart', {
    type: 'doughnut',
    data: {
      labels: ['EN Curtidas','EN Coment.','EN Saves','EN Shares','FR Curtidas','FR Coment.','FR Saves','FR Shares'],
      datasets: [{
        data: [en.likes||0,en.comments||0,en.saves||0,en.shares||0,fr.likes||0,fr.comments||0,fr.saves||0,fr.shares||0],
        backgroundColor: ['#0057B8','#2E7FD9','#A89DF5','#C4BCFF','#FAB900','#FF9A6C','#FFB898','#FFD4C2'],
        borderWidth:2, borderColor:'#fff'
      }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ usePointStyle:true, boxWidth:8, font:{size:10} } } } }
  });
}

function renderAccountCharts(acct) {
  const d      = cur()[acct];
  if (!d) return;
  const labels = KEYS.map(k => DATA[k]?.label?.split('·')[0].trim() || k);
  const followers = KEYS.map(k => DATA[k]?.[acct]?.followers || 0);
  const color  = acct === 'en' ? '#0057B8' : '#FAB900';
  const colorB = acct === 'en' ? 'rgba(0,87,184,0.1)' : 'rgba(250,185,0,0.1)';

  mkChart(acct + 'HistChart', {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label:'Seguidores', data:followers,
        backgroundColor:colorB, borderColor:color, borderWidth:2, borderRadius:8
      }]
    },
    options: chartOpts
  });

  mkChart(acct + 'MixChart', {
    type: 'doughnut',
    data: {
      labels: ['Curtidas','Comentários','Salvamentos','Shares','Reposts'],
      datasets: [{
        data: [d.likes||0,d.comments||0,d.saves||0,d.shares||0,d.reposts||0],
        backgroundColor: ['#0057B8','#22C55E','#F59E0B','#FAB900','#94A3B8'],
        borderWidth:2, borderColor:'#fff'
      }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ usePointStyle:true, boxWidth:8, font:{size:11} } } } }
  });
}

// ══════════════════════════════════════════════════════════
//  R E N D E R   A L L
// ══════════════════════════════════════════════════════════
function renderAll() {
  renderOverview();
  renderAccountPage('en');
  renderAccountPage('fr');
  renderDebriefPage();
  const activeId = document.querySelector('.tab.active')?.id?.replace('tab-','') || 'overview';
  if (activeId === 'overview') renderOverviewCharts();
  if (activeId === 'en') renderAccountCharts('en');
  if (activeId === 'fr') renderAccountCharts('fr');
}

renderAll();
// ══════════════════════════════════════════════════════════
//  T H E M E   T O G G L E
// ══════════════════════════════════════════════════════════
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} }); charts = {};
  renderAll();
}
</script>
</body>
